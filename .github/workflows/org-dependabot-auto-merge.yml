name: Dependabot Auto-Merge
on:
  pull_request_target:
    types: [opened, synchronize, reopened]
jobs:
  auto-merge:
    # Trust boundary (pull_request_target + secrets: inherit): the caller-level
    # actor gate keeps secrets out of the path for fork/attacker PRs.
    if: github.event.pull_request.user.login == 'dependabot[bot]'
    uses: Coalfire-CF/Actions/.github/workflows/org-dependabot-auto-merge.yml@f6f14772b623150ffc6ca409b623003a8770f103 # v0.11.2
    secrets: inherit
