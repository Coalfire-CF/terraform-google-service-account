name: Org Terraform Validate

permissions:
  contents: write
  pull-requests: write

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
    paths:
      - "**.tf"
      - "**.tfvars"
      - "**.hcl"
      - ".terraform.lock.hcl"
      - "**/terraform/**"

jobs:
  create-release:
    uses: Coalfire-CF/Actions/.github/workflows/org-terraform-validate.yml@f6f14772b623150ffc6ca409b623003a8770f103 # v0.11.2
    with:
      terraform_version: "1.15.7"
